name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: POD Alt text.exe
            asset_name: POD-Alt-Text-Windows.exe
          - os: macos-latest
            artifact_name: POD-Alt-Text-MacOS.zip
            asset_name: POD-Alt-Text-MacOS.zip
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon="podsoftware.ico" --name="POD Alt text" main.py
        
    - name: Build with PyInstaller (Mac)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --noconfirm --onefile --windowed --name="POD Alt text" main.py
        cd dist
        zip -r POD-Alt-Text-MacOS.zip "POD Alt text.app"
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: POD-Alt-Text-Windows.exe
        path: ./artifacts/windows
        
    - name: Download MacOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: POD-Alt-Text-MacOS.zip
        path: ./artifacts/macos
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/windows/POD Alt text.exe
          ./artifacts/macos/POD-Alt-Text-MacOS.zip
        draft: false
        prerelease: false
        generate_release_notes: true
